name: Playwright Tests

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  test:
    timeout-minutes: 60
    runs-on: ubuntu-latest

    permissions:
      contents: read
      pages: write
      id-token: write
      issues: write

    strategy:
      matrix:
        shard: [1/4, 2/4, 3/4, 4/4] # шарды
        project: [chromium, firefox, webkit] # браузеры

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: lts/*

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright Browsers
        run: npx playwright install --with-deps

      - name: Install Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Install Allure CLI
        run: npm install -g allure-commandline

      - name: Run Playwright tests
        run: |
          npx playwright test --shard=${{ matrix.shard }} --project=${{ matrix.project }} --workers=2

      - name: Generate Allure report
        run: allure generate allure-results --clean -o allure-report || true

      - name: Set safe shard name
        shell: bash
        run: echo "SAFE_SHARD=${GITHUB_MATRIX_SHARD//\//-}" >> $GITHUB_ENV
        env:
          GITHUB_MATRIX_SHARD: ${{ matrix.shard }}

      - uses: actions/upload-artifact@v4
        if: ${{ !cancelled() }}
        with:
          name: playwright-report-${{ matrix.project }}-shard-${{ env.SAFE_SHARD }}
          path: playwright-report
          retention-days: 30

      - uses: actions/upload-artifact@v4
        if: ${{ !cancelled() }}
        with:
          name: allure-report-${{ matrix.project }}-shard-${{ env.SAFE_SHARD }}
          path: allure-report
          retention-days: 30

  pages-deploy:
    runs-on: ubuntu-latest
    needs: test
    permissions:
      contents: read
      pages: write
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - name: Download Allure artifacts for Chromium
        uses: actions/download-artifact@v4
        with:
          name: allure-report-chromium-shard-1-4
          path: allure-results
      - uses: actions/download-artifact@v4
        with:
          name: allure-report-chromium-shard-2-4
          path: allure-results
      - uses: actions/download-artifact@v4
        with:
          name: allure-report-chromium-shard-3-4
          path: allure-results
      - uses: actions/download-artifact@v4
        with:
          name: allure-report-chromium-shard-4-4
          path: allure-results

      - name: Download Allure artifacts for Firefox
        uses: actions/download-artifact@v4
        with:
          name: allure-report-firefox-shard-1-4
          path: allure-results
      - uses: actions/download-artifact@v4
        with:
          name: allure-report-firefox-shard-2-4
          path: allure-results
      - uses: actions/download-artifact@v4
        with:
          name: allure-report-firefox-shard-3-4
          path: allure-results
      - uses: actions/download-artifact@v4
        with:
          name: allure-report-firefox-shard-4-4
          path: allure-results

      - name: Download Allure artifacts for Webkit
        uses: actions/download-artifact@v4
        with:
          name: allure-report-webkit-shard-1-4
          path: allure-results
      - uses: actions/download-artifact@v4
        with:
          name: allure-report-webkit-shard-2-4
          path: allure-results
      - uses: actions/download-artifact@v4
        with:
          name: allure-report-webkit-shard-3-4
          path: allure-results
      - uses: actions/download-artifact@v4
        with:
          name: allure-report-webkit-shard-4-4
          path: allure-results

      - name: Merge Allure results
        run: |
          mkdir merged-allure
          cp -r allure-results/* merged-allure/
          allure generate merged-allure --clean -o merged-allure-report

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: merged-allure-report
          name: github-pages

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

      - name: Comment Allure Report link in PR
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const url = `https://${context.repo.owner}.github.io/${context.repo.repo}/`;
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `Allure Report available here:\n${url}`
            });