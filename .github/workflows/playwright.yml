name: Playwright Tests and Allure Report

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  test-and-deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    permissions:
      contents: read
      pages: write
      id-token: write
      issues: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: lts/*

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright Browsers
        run: npx playwright install --with-deps

      - name: Install Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Install Allure CLI
        run: npm install -g allure-commandline

      - name: Run Playwright tests for all projects
        run: npx playwright test --workers=2

      - name: Generate Allure report
        run: allure generate allure-results --clean -o allure-report

      - name: List Allure report
        run: ls -R allure-report

      - name: Upload Allure report to Pages
        uses: actions/upload-pages-artifact@v3
        with:
          path: allure-report/* # звёздочка = содержимое отчёта в корень Pages
          name: github-pages

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

      - name: Comment Allure Report link in PR
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const url = `https://${context.repo.owner}.github.io/${context.repo.repo}/`;
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `Allure Report available here:\n${url}`
            });
