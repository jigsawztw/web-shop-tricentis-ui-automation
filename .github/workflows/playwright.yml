name: Playwright Tests

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  test:
    timeout-minutes: 60
    runs-on: ubuntu-latest

    permissions:
      contents: read
      pages: write
      id-token: write
      issues: write

    strategy:
      matrix:
        shard: [1/2, 2/2]  # 2 шарда на браузер
        project: [chromium, webkit, "Google Chrome", "Mobile Safari"]

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: lts/*

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright Browsers
        run: npx playwright install --with-deps

      - name: Install Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Install Allure CLI
        run: npm install -g allure-commandline

      - name: Run Playwright tests
        run: |
          npx playwright test --shard=${{ matrix.shard }} --project="${{ matrix.project }}" --workers=2

      - name: Set safe shard name
        shell: bash
        run: echo "SAFE_SHARD=${GITHUB_MATRIX_SHARD//\//-}" >> $GITHUB_ENV
        env:
          GITHUB_MATRIX_SHARD: ${{ matrix.shard }}

      - name: Upload Allure results
        uses: actions/upload-artifact@v4
        if: ${{ always() }}
        with:
          name: allure-results-${{ matrix.project }}-shard-${{ env.SAFE_SHARD }}
          path: allure-results
          retention-days: 30

  pages-deploy:
    runs-on: ubuntu-latest
    needs: test
    permissions:
      contents: read
      pages: write
      id-token: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: lts/*

      - name: Install Allure CLI
        run: npm install -g allure-commandline

      - name: Prepare merged-results folder
        run: mkdir merged-results

      - name: Download all existing allure-results artifacts
        run: |
          projects=(chromium webkit "Google Chrome" "Mobile Safari")
          shards=(1-2 2-2)
          for project in "${projects[@]}"; do
            for shard in "${shards[@]}"; do
              artifact_name="allure-results-${project}-shard-${shard}"
              echo "Trying to download $artifact_name"
              gh actions download-artifact "$artifact_name" --dir merged-results 2>/dev/null || echo "$artifact_name not found, skipping"
            done
          done

      - name: Check merged-results
        run: |
          if [ -z "$(ls -A merged-results 2>/dev/null)" ]; then
            echo "No allure-results found, skipping report generation"
            mkdir merged-allure-report
            exit 0
          else
            echo "Allure results found, generating report"
          fi

      - name: Generate merged Allure report
        run: allure generate merged-results --clean -o merged-allure-report

      - name: List merged report files
        run: ls -R merged-allure-report || echo "Folder empty"

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: merged-allure-report/*  # важно для index.html в корне
          name: github-pages

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

      - name: Comment Allure Report link in PR
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const url = `https://${context.repo.owner}.github.io/${context.repo.repo}/`;
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `Allure Report available here:\n${url}`
            });