name: Playwright Tests

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  test:
    timeout-minutes: 60
    runs-on: ubuntu-latest
    name: ${{ matrix.project }} | shard ${{ matrix.shard }}

    strategy:
      fail-fast: false
      matrix:
        shard: [1, 2, 3, 4]
        project:
          [
            chromium,
            webkit,
            "Mobile Chrome",
            "Mobile Safari",
            "Microsoft Edge",
            "Google Chrome",
          ]

    permissions:
      contents: read
      pages: write
      id-token: write
      issues: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: lts/*

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright
        run: npx playwright install --with-deps

      - name: Run Playwright tests
        run: |
          npx playwright test \
            --project="${{ matrix.project }}" \
            --shard=${{ matrix.shard }}/4

      - name: Upload Allure Results
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v4
        with:
          name: allure-${{ matrix.project }}-${{ matrix.shard }}
          path: allure-results
          retention-days: 7

  merge-reports:
    name: Merge Allure Reports
    needs: test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Allure CLI
        run: npm install -g allure-commandline

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Merge Allure results
        run: |
          mkdir merged-results
          find artifacts -type f -name "*.json" -exec cp {} merged-results \;

      - name: Generate Allure report
        run: allure generate merged-results --clean -o allure-report

      - name: Upload final report
        uses: actions/upload-artifact@v4
        with:
          name: final-allure-report
          path: allure-report

  deploy:
    name: Deploy to GitHub Pages
    needs: merge-reports
    runs-on: ubuntu-latest

    permissions:
      pages: write
      id-token: write

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Download final report
        uses: actions/download-artifact@v4
        with:
          name: final-allure-report
          path: allure-report

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: allure-report

      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4

      - name: Comment report link in PR
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const url = `https://${context.repo.owner}.github.io/${context.repo.repo}/`;

            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `✅ Allure Report:\n${url}`
            });
